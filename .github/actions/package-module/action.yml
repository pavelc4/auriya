name: Package Module
description: Package Auriya module with ultra compression

inputs:
  build_type:
    description: "Type of build (debug or release)"
    required: false
    default: "debug"

outputs:
  zip_name:
    description: Name of the created zip file
    value: ${{ steps.package.outputs.zip_name }}
  version:
    description: Version from Cargo.toml
    value: ${{ steps.package.outputs.version }}
  version_code:
    description: Version code (total commits)
    value: ${{ steps.package.outputs.version_code }}

runs:
  using: composite
  steps:
    - name: Package Module
      id: package
      shell: bash
      run: |
        set -e

        BUILD_DIR="build/release"
        MODULE_DIR="module"

        mkdir -p "$BUILD_DIR/module"

        # 1. Base files
        cp -r "$MODULE_DIR"/* "$BUILD_DIR/module/"
        cp settings.toml "$BUILD_DIR/module/" 2>/dev/null || true
        cp gamelist.toml "$BUILD_DIR/module/" 2>/dev/null || true
        cp -r module/system "$BUILD_DIR/module/" 2>/dev/null || true

        # 2. APKs (companion service + UI app)
        APPS_DIR="$BUILD_DIR/module/libs/companion"
        mkdir -p "$APPS_DIR"

        APP_APK="android/app/build/outputs/apk/release/app-arm64-v8a-release.apk"
        SERVICE_APK="android/service/build/outputs/apk/release/service-release.apk"

        if [ -f "$APP_APK" ]; then
            cp "$APP_APK" "$APPS_DIR/auriya-app.apk"
            echo "Packaged app APK ($(du -h "$APP_APK" | cut -f1))"
        else
            echo "Warning: App APK not found at $APP_APK"
        fi

        if [ -f "$SERVICE_APK" ]; then
            cp "$SERVICE_APK" "$APPS_DIR/service.apk"
            echo "Packaged service APK ($(du -h "$SERVICE_APK" | cut -f1))"
        else
            echo "Warning: Service APK not found at $SERVICE_APK"
        fi

        # 4. Binary (aarch64 only)
        TARGET="aarch64-linux-android"
        ARCH="aarch64"

        BIN="target/$TARGET/release/auriya"
        CLI_BIN="target/$TARGET/release/auriyactl"

        if [ -f "$BIN" ]; then
            echo "Packaging $ARCH ($TARGET)..."
            DEST_DIR="$BUILD_DIR/module/libs/$ARCH"
            mkdir -p "$DEST_DIR"

            # Copy Daemon
            cp "$BIN" "$DEST_DIR/auriya"

            # Copy CLI if exists
            if [ -f "$CLI_BIN" ]; then
                cp "$CLI_BIN" "$DEST_DIR/auriyactl"
            else
                echo "Warning: CLI Binary not found at $CLI_BIN"
            fi

            # Checksums
            (cd "$DEST_DIR" && sha256sum * > checksums.sha256)
        else
            echo "ERROR: Binary not found at $BIN" >&2
            exit 1
        fi

        # Get version from Cargo.toml
        VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
        COMMIT_HASH=$(git rev-parse --short HEAD)
        VERSION_CODE=$(git rev-list --count HEAD)

        # Update module.prop
        sed -i "s/^version=.*/version=${VERSION} (${VERSION_CODE}-${COMMIT_HASH}-release)/" "$BUILD_DIR/module/module.prop"
        sed -i "s/^versionCode=.*/versionCode=${VERSION_CODE}/" "$BUILD_DIR/module/module.prop"

        # Filename
        BUILD_TYPE="${{ inputs.build_type }}"
        ZIP_NAME="auriya-${VERSION}-${VERSION_CODE}-${COMMIT_HASH}-${BUILD_TYPE}.zip"

        # Clean build.sh placeholders if any
        find "$BUILD_DIR/module" -name ".placeholder" -delete 2>/dev/null || true

        cd "$BUILD_DIR/module"
        7z a -tzip -mm=Deflate -mx=9 -mfb=258 -mpass=15 "../$ZIP_NAME" .
        cd -

        echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

        ls -lh "$BUILD_DIR/$ZIP_NAME"
