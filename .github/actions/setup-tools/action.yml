name: Setup Build Environment
description: Setup all required tools for building Auriya

runs:
  using: composite
  steps:
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 26

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r29
        add-to-path: true

    - name: Setup Rust (nightly for eBPF)
      uses: dtolnay/rust-toolchain@nightly
      with:
        targets: aarch64-linux-android
        components: rust-src

    - name: Set nightly as default (kala eBPF build script needs it)
      run: rustup default nightly-x86_64-unknown-linux-gnu
      shell: bash

    - name: Install bpf-linker (for eBPF CO-RE)
      run: cargo install bpf-linker
      shell: bash

    - name: Install cargo-ndk
      run: cargo install cargo-ndk
      shell: bash

    - name: Install Compression Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y p7zip-full
      shell: bash
