name: Release Auriya

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Notify Release Start
        id: notify_start
        if: ${{ env.BOT_TOKEN != '' }}
        uses: ./.github/actions/telegram-notify
        with:
          bot_token: ${{ secrets.BOT_TOKEN }}
          chat_id: ${{ secrets.CHAT_ID }}
          type: start

      - name: Setup Build Environment
        uses: ./.github/actions/setup-tools

      - name: Build WebUI
        working-directory: ./webui
        run: |
          bun install
          bun run build

      - name: Build Rust Binary (Multi-Arch)
        run: |
          TARGETS=("aarch64-linux-android" "armv7-linux-androideabi" "x86_64-linux-android")

          sed -i "s|/opt/android-ndk|${ANDROID_NDK_HOME}|g" .cargo/config.toml

          for target in "${TARGETS[@]}"; do
              echo "Building for $target..."
              cargo ndk -t "$target" --platform 26 -- build --release --bin auriya --bin auriyactl

              BINARY="target/$target/release/auriya"
              CLI_BINARY="target/$target/release/auriyactl"
              LLVM_STRIP="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"

              if [ -f "$LLVM_STRIP" ]; then
                  "$LLVM_STRIP" --strip-all "$BINARY"
                  "$LLVM_STRIP" --strip-all "$CLI_BINARY"
              else
                  strip --strip-all "$BINARY"
                  strip --strip-all "$CLI_BINARY"
              fi
              sha256sum "$BINARY" > "${BINARY}.sha256"
              sha256sum "$CLI_BINARY" > "${CLI_BINARY}.sha256"
          done

      - name: Package Module
        id: package
        uses: ./.github/actions/package-module
        with:
          build_type: release

      - name: Capture Release Info
        id: build
        run: |
          echo "zip_name=${{ steps.package.outputs.zip_name }}" >> $GITHUB_OUTPUT
          echo "version=${{ steps.package.outputs.version }}" >> $GITHUB_OUTPUT
          echo "version_code=${{ steps.package.outputs.version_code }}" >> $GITHUB_OUTPUT

      - name: Resolve Tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            VERSION="${{ steps.build.outputs.version }}"
            if [ -z "$VERSION" ]; then
              echo "ERROR: version output is empty" && exit 1
            fi
            echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: build/release/${{ steps.build.outputs.zip_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update update.json
        run: |
          VERSION=${{ steps.build.outputs.version }}
          VERSION_CODE=${{ steps.build.outputs.version_code }}
          ZIP_NAME=${{ steps.build.outputs.zip_name }}
          TAG=${{ steps.tag.outputs.tag }}

          CHANGELOG=$(awk '/^## v/{if(p)exit;p=1;next} p' CHANGELOG.md | \
            sed 's/^### //' | \
            sed 's/\*\*//g' | \
            sed 's/^- /● /' | \
            sed 's/^  - /  ● /' | \
            sed 's/`//g' | \
            sed 's/^---$//' | \
            sed '/^$/d' | \
            head -20 | \
            jq -Rs .)

          cat > update.json << EOF
          {
              "version": "$VERSION",
              "versionCode": $VERSION_CODE,
              "zipUrl": "https://github.com/${{ github.repository }}/releases/download/$TAG/$ZIP_NAME",
              "changelog": "https://raw.githubusercontent.com/${{ github.repository }}/main/CHANGELOG.md"
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json
          git commit -m "chore: update update.json to v$VERSION" || echo "No changes"
          git push origin HEAD:main

      - name: Notify Release Complete
        if: ${{ env.BOT_TOKEN != '' }}
        uses: ./.github/actions/telegram-notify
        with:
          bot_token: ${{ secrets.BOT_TOKEN }}
          chat_id: ${{ secrets.CHAT_ID }}
          type: complete
          zip_file: build/release/${{ steps.build.outputs.zip_name }}
          delete_message_id: ${{ steps.notify_start.outputs.message_id }}
          caption: |
            <b>Auriya v${{ steps.build.outputs.version }} Released!</b>

            <a href="https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.tag }}">GitHub Release</a> • <a href="https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md">Changelog</a>

      - name: Notify Release Failure
        if: failure() && env.BOT_TOKEN != ''
        uses: ./.github/actions/telegram-notify
        with:
          bot_token: ${{ secrets.BOT_TOKEN }}
          chat_id: ${{ secrets.CHAT_ID }}
          type: failure
          delete_message_id: ${{ steps.notify_start.outputs.message_id }}